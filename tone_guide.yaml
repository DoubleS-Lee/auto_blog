tone:
  opening_pattern: "지난 포스팅에 이어서 이번에는 (주제)에 대해 리뷰를 하려고 한다."
  sentence_length: "구어체 중심의 간결하고 리듬감 있는 문장, 단락마다 짧은 줄바꿈"
  vocabulary: "블로그 친화적인 일상 용어, 적절한 이모티콘 사용, 솔직한 감탄사"
  avoid:
    - "딱딱한 개조식 보고서 형식"
    - "지나치게 격식을 차린 문체"
  signature_phrases:
    - "이 점을 참고하면 되겠다."
    - "덕분에 ~할 수 있었다."
    - "사실 ~했었는데 결과적으로는 ~했다."
    - "정보가 유용했다면 ~하기를 바란다."
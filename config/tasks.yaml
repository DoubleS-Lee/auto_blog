keyword_research_task:
  description: >
    지금 네이버에서 핫한 키워드를 먼저 발굴한 뒤,
    그 키워드를 블로그 컨셉 '세상 모든 것에는 이유가 있다'와 연결하여 주제를 추천하라.

    ※ 절대 금지: '이유', '원리', '왜', '하는 이유' 같은 테마 접미사를 DataLab에 넣지 말 것.
       테마 키워드로 검색하면 항상 같은 결과만 나온다.

    [1단계] 쇼핑인사이트로 핫한 카테고리 + 인기 키워드 파악 — NaverShoppingInsightTool 사용
    period_days=30으로 호출한다.
    툴이 자동으로 9개 카테고리 순위를 매기고, 상위 5개 카테고리에서
    사람들이 실제로 검색하는 인기 키워드를 추출해 반환한다.
    결과 예시:
      1위 카테고리: 식품 → 인기 키워드: 프로틴, 닭가슴살, 간헐적단식, 저탄고지, 유산균, ...
      2위 카테고리: 생활/건강 → 인기 키워드: 마그네슘, 오메가3, 멀티비타민, ...
      3위 카테고리: 스포츠/레저 → 인기 키워드: 러닝화, 요가매트, 폼롤러, ...
      4위 카테고리: 화장품/미용 → 인기 키워드: 선크림, 비타민C, 레티놀, ...
      5위 카테고리: 반려동물용품 → 인기 키워드: 사료, 간식, 영양제, ...
    이 키워드들이 주제 후보 풀의 핵심 소재다. NaverSearchTool은 사용하지 않는다.

    [2단계] 트렌드 검증 — NaverDataLabTool 사용
    1단계에서 나온 키워드 중 성격이 다른 5개를 골라 최근 30일 검색량을 비교한다.
    예: ["프로틴", "러닝화", "마그네슘", "간헐적단식", "닭가슴살"]
    검색량이 높고 상승 중인 키워드를 우선 선정한다.
    ※ '이유', '원리', '왜' 같은 테마 접미사는 절대 DataLab에 넣지 말 것.

    [3단계] '이유' 각도로 주제 후보 도출 — LLM이 직접 수행
    2단계에서 선정된 핫한 키워드에 '세상 모든 것에는 이유가 있다' 컨셉을 입힌다.
    연결 방법: 핫한 키워드 현상/행동/트렌드 → "왜 그럴까?" 로 접근
    - 예시 연결:
      "프로틴" → "운동 후 단백질을 먹어야 하는 이유", "단백질이 근육이 되는 이유"
      "간헐적단식" → "공복에 더 배고픈 이유", "요요가 생기는 이유"
      "러닝화" → "달리기 후 무릎이 아픈 이유", "쿠션화가 오히려 부상을 유발하는 이유"
      "반려동물" → "강아지가 주인만 보면 짖는 이유", "고양이가 높은 곳을 좋아하는 이유"
    각 키워드마다 '이유' 각도의 구체적 주제를 1~2개 도출해 후보 풀(15개 이상)을 만든다.

    [4단계] 경쟁도 검증 — NaverBlogCompetitionTool 사용
    3단계에서 도출한 주제 후보 전체를 NaverBlogCompetitionTool에 넣어 경쟁도를 분석한다.
    별 4~5개(경쟁 낮음) 주제를 우선 선정하고, 별 1~2개(포화) 주제는 제외하거나
    더 구체적인 롱테일 키워드로 변경한다.

    [5단계] 최종 주제 10개 확정
    경쟁도 분석 결과를 반영해 기회 점수 높은 주제 10개를 최종 선정한다.
    선정된 주제의 메인/서브 키워드도 함께 정한다.

    [출력 형식 - 아래 항목을 반드시 포함할 것]
    메인 키워드: (키워드)
    서브 키워드: (키워드1), (키워드2), (키워드3)
    경쟁 글 분석: (상위 글들의 패턴 요약)
    추천 제목 방향: (클릭을 유도하는 제목 방향 2~3가지)
    RECOMMENDED_TOPICS: 주제1 | 주제2 | 주제3 | 주제4 | 주제5 | 주제6 | 주제7 | 주제8 | 주제9 | 주제10

    [RECOMMENDED_TOPICS 출력 규칙 - 반드시 준수]
    - 반드시 "RECOMMENDED_TOPICS:" 로 시작하는 한 줄로 출력한다.
    - 주제는 파이프(|)로 구분하고, 괄호 없이 주제 텍스트만 적는다.
    - 정확히 10개 주제를 출력한다.
    - 각 주제는 지금 화제인 키워드 + '이유/원리' 각도가 결합된 형태여야 한다.
    - 올바른 예시: RECOMMENDED_TOPICS: 요요가 생기는 이유 | 프로틴이 근육이 되는 이유 | 마그네슘이 잠에 도움이 되는 이유 | 러닝화 쿠션이 오히려 부상을 유발하는 이유 | 고양이가 높은 곳을 좋아하는 이유 | 강아지가 주인만 보면 짖는 이유 | 선크림을 매일 발라야 하는 이유 | 레티놀이 피부에 효과적인 이유 | 비행기 안에서 귀가 먹먹해지는 이유 | 공복에 더 배고픈 이유
    - 잘못된 예시: RECOMMENDED_TOPICS: (수학을 배우는 이유) | (강아지가 짖는 이유)
  expected_output: >
    트렌드 발굴 결과, 메인/서브 키워드, 경쟁 글 패턴, 추천 제목 방향, RECOMMENDED_TOPICS 목록이 포함된 키워드 전략 보고서
  agent: seo_analyst

content_writing_task:
  description: >
    '{topic}' 주제의 Why 블로그 글을 작성하라.

    [필수 규칙]
    - 절대로 AI가 쓴 것처럼 느껴지면 안 됨
    - 항상 '왜?'라는 질문에서 출발하여 논리적 근거를 제시할 것
    - 경험/사유 기반 서술 포함: "생각해보면...", "실제로 알고 보면...", "흥미롭게도..." 등
    - 전문 용어는 괄호로 쉽게 풀이 (예: 미분(순간변화율))
    - 분량: 2000~3000자
    - 모바일 가독성 최우선:
      한 문장은 짧고 간결하게 작성하고,
      한 줄이 약 30자(띄어쓰기 포함)를 넘으면 반드시 줄바꿈할 것

    [작성 강조 사항 - 아래 내용을 반드시 반영할 것]
    {emphasis}

    [글 구조 - 아래 형식을 반드시 따를 것]
    글은 다음 패턴을 반복하여 4~6개 섹션으로 구성한다:

      [IMAGE_N]
      > 소제목 (짧고 흥미로운 문장)

      본문 단락. 짧게 끊어 읽기 쉽게. **강조할 단어**는 양쪽에 별표 두 개로 감싼다.
      한 단락은 2~4줄 이내.

      (빈 줄로 단락 구분)

    - 첫 번째 [IMAGE_1]은 글 맨 앞에 (서론 텍스트 전에) 배치
    - 이후 각 섹션은 [IMAGE_N] → > 소제목 → 본문 순서로 배치
    - #, ##, ### 헤딩 기호 절대 사용 금지
    - 소제목은 반드시 '> ' 형식만 사용
    - 강조는 반드시 **텍스트** 형식만 사용 (다른 마크다운 기호 금지)

    [톤앤매너 가이드 - 이 스타일을 따를 것]
    {tone_guide}
  expected_output: >
    [IMAGE_1]
    > 소제목
    본문...
    [IMAGE_2]
    > 소제목
    본문...
    형태로 구성된 블로그 글 (> 소제목과 **강조** 외 마크다운 기호 없음)
  agent: content_writer
  context:
    - keyword_research_task

image_generation_task:
  description: >
    블로그 글의 [IMAGE_N] 마커 개수에 맞춰 주제에 어울리는 이미지를 생성하라.

    [처리 순서 - 각 이미지마다 반복]
    GeminiImageGeneratorTool로 Imagen 4 이미지 생성:
    - prompt: 글 주제와 어울리는 분위기, 영어로 작성
    - main_keyword: keyword_research_task의 메인 키워드 (한국어)
    - sub_keyword: keyword_research_task의 서브 키워드 (한국어)
    - image_index: 이미지 번호
    - 텍스트/문자/한자/숫자가 절대 포함되지 않도록 명시

    이미지 스타일: 글 주제와 어울리는 분위기면 모두 가능 (스타일 제한 없음)
  expected_output: >
    각 이미지의 최종 저장 경로 목록 (SEO 파일명 적용된 .jpg 경로)
    예시:
    IMAGE_1: output/images/수학배우는이유_미분원리_1.jpg
    IMAGE_2: output/images/수학배우는이유_미분원리_2.jpg
  agent: image_creator
  context:
    - content_writing_task
    - keyword_research_task

seo_optimization_task:
  description: >
    content_writer가 작성한 글을 네이버 SEO에 맞게 최종 완성하라.

    [처리 순서]
    1. 불필요한 마크다운 기호 제거: #, ##, ###, ___, -, ``` 등 삭제
       - 단, 아래 세 가지는 반드시 원형 그대로 보존:
         ① [IMAGE_N] 마커 (절대 삭제/변경 금지)
         ② > 소제목 형식 (인용구 블록용, 보존)
         ③ **강조 텍스트** 형식 (굵게 처리용, 보존)
    2. 메인 키워드를 제목, 첫 문단, 중간, 마지막 문단에 자연스럽게 배치
    3. 블로그 제목 초안 작성 (20~35자, 메인 키워드 앞부분 배치, 클릭 유도형)
    4. TitleSEOCheckerTool로 제목 품질 검사
       - title: 작성한 제목, main_keyword: 메인 키워드
       - 점수 75 미만이면 피드백을 반영해 제목을 수정하고 재검사한다
       - 75 이상이 될 때까지 반복한다 (최대 3회)
    5. 태그 15개 선정 (쉼표 구분, 메인/서브/롱테일 키워드 혼합)
  expected_output: >
    아래 형식으로 출력:
    TITLE: (블로그 제목)
    CONTENT:
    ([IMAGE_N], > 소제목, **강조** 보존된 본문 전체)
    TAGS: (태그1,태그2,...,태그15)
  agent: seo_optimizer
  context:
    - content_writing_task
    - keyword_research_task

blog_publishing_task:
  description: >
    최적화된 블로그 글을 네이버 스마트에디터 ONE에 발행하라.

    NaverSmartEditorTool을 호출할 때 blocks 파라미터는
    main.py에서 파싱된 블록 배열을 그대로 전달한다.

    [입력 파라미터]
    - title: seo_optimization_task의 TITLE 값
    - blocks: {blocks}
    - tags: seo_optimization_task의 TAGS 값
  expected_output: "발행 완료 메시지 (게시 완료: 제목)"
  agent: blog_publisher
  context:
    - seo_optimization_task
    - image_generation_task

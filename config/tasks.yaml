keyword_research_task:
  description: >
    지금 네이버에서 실질적인 검색 유입을 일으킬 수 있는 '명사형 황금 키워드'를 발굴하고,
    글로벌 유튜브 흥행 데이터로 주제 흥미도를 검증한 뒤,
    블로그 컨셉 '세상 모든 것에는 이유가 있다'와 연결하여 최적의 주제를 추천하라.

    ※ 데이터 오염 방지: '이유', '원리', '왜' 등은 오직 [3단계] 주제 생성 시에만 사용한다.
       DataLab이나 경쟁도 조회 시에는 절대 포함하지 않는다.

    [1단계] 쇼핑인사이트로 수요 데이터 확보 — NaverShoppingInsightTool
    period_days=30으로 호출한다.
    상위 5개 카테고리에서 실제 구매/검색 수요가 높은 명사형 키워드들을 추출한다.
    결과 예시: [마그네슘, 프로틴, 닭가슴살, 러닝화, 레티놀, ...]

    [2단계] 검색량 검증으로 핵심 키워드 20개 선정 — NaverDataLabTool
    1단계 키워드 중 검색량이 일정 수준 이상이며 하락세가 아닌 명사 20개를 선정한다.
    ※ DataLab 입력에 '이유/원리/왜' 절대 포함 금지.

    [3단계] 글로벌 YouTube 흥행 검증 — YouTubeTrendTool
    2단계에서 선정된 키워드 각각을 영어로 번역하여 YouTubeTrendTool로 검색한다.
    예: '마그네슘' → keyword="magnesium", '러닝화' → keyword="running shoes"
    조회수 높은 영상 제목의 스토리텔링 패턴(충격·반전·의외)을 파악한다.

    이후 아래 기준으로 자체 평가한다:
      ① 메인 키워드(명사)가 주제에 포함되는가?
      ② 뻔하지 않고 충격적/반전/의외의 정보인가?
      ③ 글로벌 유튜브 트렌드를 기반으로 한 인사이트인가?
    → 3가지 모두 충족하는 주제만 다음 단계로 진행한다.

    글 주제(문장)와 타겟 키워드(명사)를 쌍으로 생성한다.
    - 예시:
      - YouTube: "Stop taking Magnesium at night" (조회수 500만)
      - 타겟 키워드(명사): '마그네슘 수면'
      - 글 주제(문장): "밤에 마그네슘을 먹으면 수면을 망치는 진짜 이유"
      - 평가: 명사 포함(O) / 반전 정보(O) / 글로벌 인사이트(O) → 합격

      - YouTube: "Why expensive running shoes destroy your knees" (조회수 800만)
      - 타겟 키워드(명사): '무릎 통증'
      - 글 주제(문장): "비싼 러닝화가 오히려 무릎을 망가뜨리는 원리"
      - 평가: 명사 포함(O) / 반전 정보(O) / 글로벌 인사이트(O) → 합격

    [4단계] 네이버 경쟁도 분석 — NaverBlogCompetitionTool
    반드시 '글 주제(문장)'가 아닌 **'타겟 키워드(명사)'**를 입력한다.
    문장으로 검색하면 경쟁도가 낮게 나와 무의미하다.
    별 4~5개(경쟁 낮음)인 키워드만 '생존'시키고, 별 1~2개(포화 상태)인 키워드는 가차 없이 버린다.
    만약 생존한 주제가 최종 목표인 10개에 미달한다면, 다시 2단계나 3단계로 돌아가 새로운 키워드를 발굴하여 10개가 채워질 때까지 이 과정을 반복(Loop)한다.

    [5단계] 최종 전략 리포트 작성
    기회 점수 높은 10개 세트를 확정하고 아래 형식으로 출력한다.

    [출력 형식 - 반드시 준수]
    각 주제마다:
      대표 주제(Topic): (흥미로운 문장)
      메인 키워드(Target): (명사형 키워드)
      서브 키워드: (연관 명사 3개)
      YouTube 근거: (참고한 영상 제목 + 조회수)
      경쟁도: (별점)

    RECOMMENDED_TOPICS: 주제1 | 주제2 | ... | 주제10

    [RECOMMENDED_TOPICS 출력 규칙 - 반드시 준수]
    - 반드시 "RECOMMENDED_TOPICS:" 로 시작하는 한 줄로 출력.
    - '이유/원리'가 포함된 흥미로운 문장 형태여야 함.
    - 주제는 파이프(|)로 구분하고, 괄호 없이 주제 텍스트만 적는다.
    - 정확히 10개 주제를 출력한다.
    - 올바른 예시: RECOMMENDED_TOPICS: 밤에 마그네슘을 먹으면 수면을 망치는 진짜 이유 | 비싼 러닝화가 무릎을 망가뜨리는 원리 | 공복 유산소가 오히려 근육을 태우는 이유 | 레티놀을 낮에 바르면 안 되는 이유 | 닭가슴살만 먹으면 다이어트가 실패하는 이유 | 단백질을 운동 후가 아닌 자기 전에 먹어야 하는 이유 | 강아지가 산책 후 더 흥분하는 이유 | 선크림을 아침에만 바르면 안 되는 이유 | 고양이가 좁은 곳에 들어가려는 이유 | 물을 많이 마셔도 붓는 이유
    - 잘못된 예시: RECOMMENDED_TOPICS: (수학을 배우는 이유) | (강아지가 짖는 이유)
  expected_output: >
    트렌드 발굴 결과, 메인/서브 키워드, 경쟁 글 패턴, 추천 제목 방향, RECOMMENDED_TOPICS 목록이 포함된 키워드 전략 보고서
  agent: seo_analyst

content_writing_task:
  description: >
    '{topic}' 주제의 Why 블로그 글을 작성하라.

    [필수 규칙]
    - 절대로 AI가 쓴 것처럼 느껴지면 안 됨
    - 항상 '왜?'라는 질문에서 출발하여 논리적 근거를 제시할 것
    - 경험/사유 기반 서술 포함: "생각해보면...", "실제로 알고 보면...", "흥미롭게도..." 등
    - 전문 용어는 괄호로 쉽게 풀이 (예: 미분(순간변화율))
    - 분량: 2000~3000자
    - 모바일 가독성 최우선:
      "모든 문장은 단문(Short sentences)으로 명료하게 작성할 것. 모바일 가독성을 위해 마침표(.)로 하나의 문장이 끝날 때마다 반드시 줄바꿈(Enter)을 두 번 하여 단락을 여유롭게 나눌 것."

    [작성 강조 사항 - 아래 내용을 반드시 반영할 것]
    {emphasis}

    [글 구조 - 아래 형식을 반드시 따를 것]
    글은 다음 패턴을 반복하여 4~6개 섹션으로 구성한다:

      [IMAGE_N]
      > 소제목 (짧고 흥미로운 문장)

      본문 단락. 짧게 끊어 읽기 쉽게. **강조할 단어**는 양쪽에 별표 두 개로 감싼다.
      한 단락은 2~4줄 이내.

      (빈 줄로 단락 구분)

    - 첫 번째 [IMAGE_1]은 글 맨 앞에 (서론 텍스트 전에) 배치
    - 이후 각 섹션은 [IMAGE_N] → > 소제목 → 본문 순서로 배치
    - #, ##, ### 헤딩 기호 절대 사용 금지
    - 소제목은 반드시 '> ' 형식만 사용
    - 강조는 반드시 **텍스트** 형식만 사용 (다른 마크다운 기호 금지)

    [톤앤매너 가이드 - 이 스타일을 따를 것]
    {tone_guide}
  expected_output: >
    [IMAGE_1]
    > 소제목
    본문...
    [IMAGE_2]
    > 소제목
    본문...
    형태로 구성된 블로그 글 (> 소제목과 **강조** 외 마크다운 기호 없음)
  agent: content_writer
  context:
    - keyword_research_task

image_generation_task:
  description: >
    블로그 글의 [IMAGE_N] 마커 개수에 맞춰 주제에 어울리는 이미지를 생성하라.

    [처리 순서 - 각 이미지마다 반복]
    GeminiImageGeneratorTool로 Imagen 4 이미지 생성:
    - prompt: 글 주제와 어울리는 분위기, 영어로 작성
    - main_keyword: keyword_research_task의 메인 키워드 (한국어)
    - sub_keyword: keyword_research_task의 서브 키워드 (한국어)
    - image_index: 이미지 번호
    - 텍스트/문자/한자/숫자가 절대 포함되지 않도록 명시

    이미지 스타일: 글 주제와 어울리는 분위기면 모두 가능 (스타일 제한 없음)
  expected_output: >
    각 이미지의 최종 저장 경로 목록 (SEO 파일명 적용된 .jpg 경로)
    예시:
    IMAGE_1: output/images/수학배우는이유_미분원리_1.jpg
    IMAGE_2: output/images/수학배우는이유_미분원리_2.jpg
  agent: image_creator
  context:
    - content_writing_task
    - keyword_research_task

seo_optimization_task:
  description: >
    content_writer가 작성한 글을 네이버 SEO에 맞게 최종 완성하라.

    [처리 순서]
    1. 불필요한 마크다운 기호 제거: #, ##, ###, ___, -, ``` 등 삭제
       - 단, 아래 세 가지는 반드시 원형 그대로 보존:
         ① [IMAGE_N] 마커 (절대 삭제/변경 금지)
         ② > 소제목 형식 (인용구 블록용, 보존)
         ③ **강조 텍스트** 형식 (굵게 처리용, 보존)
    2. 메인 키워드를 제목, 첫 문단, 중간, 마지막 문단에 자연스럽게 배치
    3. 블로그 제목 초안 작성 (20~35자, 메인 키워드 앞부분 배치, 클릭 유도형)
    4. 글을 수정할 때, keyword_research_task에서 전달해준 **'메인 키워드(Target)'*인 명사 단어를 본문에 자연스럽게 녹여내라. '대표 주제(Topic)'인 문장을 그대로 반복하지 않도록 주의하라.
    5. TitleSEOCheckerTool로 제목 품질 검사
       - title: 작성한 제목, main_keyword: 메인 키워드
       - 점수 75 미만이면 피드백을 반영해 제목을 수정하고 재검사한다
       - 75 이상이 될 때까지 반복한다 (최대 3회)
    6. 태그 15개 선정 (쉼표 구분, 메인/서브/롱테일 키워드 혼합)
  expected_output: >
    아래 형식으로 출력:
    TITLE: (블로그 제목)
    CONTENT:
    ([IMAGE_N], > 소제목, **강조** 보존된 본문 전체)
    TAGS: (태그1,태그2,...,태그15)
  agent: seo_optimizer
  context:
    - content_writing_task
    - keyword_research_task

blog_publishing_task:
  description: >
    최적화된 블로그 글을 네이버 스마트에디터 ONE에 발행하라.

    NaverSmartEditorTool을 호출할 때 blocks 파라미터는
    main.py에서 파싱된 블록 배열을 그대로 전달한다.

    [입력 파라미터]
    - title: seo_optimization_task의 TITLE 값
    - blocks: {blocks}
    - tags: seo_optimization_task의 TAGS 값
  expected_output: "발행 완료 메시지 (게시 완료: 제목)"
  agent: blog_publisher
  context:
    - seo_optimization_task
    - image_generation_task
